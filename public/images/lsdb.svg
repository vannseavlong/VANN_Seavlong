<svg width="400" height="480" viewBox="0 0 400 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bodyGrad" x1="70" y1="110" x2="270" y2="290" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6FA8FF"/>
      <stop offset="1" stop-color="#2A46AE"/>
    </linearGradient>
    <linearGradient id="capGrad" x1="70" y1="80" x2="270" y2="146" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9CC7FF"/>
      <stop offset="1" stop-color="#5B8DEF"/>
    </linearGradient>
    <linearGradient id="cellGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#63A0FF"/>
      <stop offset="1" stop-color="#3B6FE0"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5B8DEF"/>
      <stop offset="1" stop-color="#2A46AE"/>
    </linearGradient>
  </defs>

  <!-- ============ icon: database cylinder + spreadsheet ============ -->
  <path d="M70,110 L70,290 A100,36 0 0 0 270,290 L270,110 Z" fill="url(#bodyGrad)"/>
  <ellipse cx="170" cy="110" rx="100" ry="36" fill="url(#capGrad)"/>

  <path d="M174,40 H284 L310,66 V216 A14,14 0 0 1 296,230 H174 A14,14 0 0 1 160,216 V54 A14,14 0 0 1 174,40 Z"
        fill="#FFFFFF"/>
  <polygon points="284,40 310,66 284,66" fill="#D7E6FF"/>

  <rect x="182" y="92"  width="34" height="20" rx="4" fill="url(#cellGrad)"/>
  <rect x="224" y="92"  width="34" height="20" rx="4" fill="url(#cellGrad)"/>
  <rect x="266" y="92"  width="34" height="20" rx="4" fill="url(#cellGrad)"/>
  <rect x="182" y="124" width="34" height="20" rx="4" fill="url(#cellGrad)"/>
  <rect x="224" y="124" width="34" height="20" rx="4" fill="url(#cellGrad)"/>
  <rect x="266" y="124" width="34" height="20" rx="4" fill="url(#cellGrad)"/>

  <!-- ============ wordmark: simple bold sans-serif ============ -->
  <text x="200" y="420" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif" font-weight="800"
        font-size="92" letter-spacing="4" fill="url(#textGrad)">LSDB</text>
</svg>
